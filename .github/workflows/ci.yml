name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libssl-dev zlib1g-dev python3 python3-venv

      - name: Install packager
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e "packager[dev]"

      - name: Run packager unit tests
        run: |
          cd packager
          ../.venv/bin/python -m pytest tests/ -v

      - name: Build consumer
        run: |
          cmake -S consumer -B consumer/build -DCMAKE_BUILD_TYPE=Release
          cmake --build consumer/build

      - name: Run end-to-end integration test
        run: sudo bash tests/integration_test.sh
